name: Supabase Keepalive

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate keepalive token
        env:
          KEEPALIVE_TOKEN: ${{ secrets.KEEPALIVE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${KEEPALIVE_TOKEN}" ]; then
            echo "::error::Missing repository secret KEEPALIVE_TOKEN"
            exit 1
          fi

      - name: Ping keepalive endpoint
        env:
          KEEPALIVE_TOKEN: ${{ secrets.KEEPALIVE_TOKEN }}
          KEEPALIVE_URL: https://badmintontracker.vercel.app/api/internal/keepalive
        run: |
          set -euo pipefail
          echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] GET ${KEEPALIVE_URL}"

          body_file="$(mktemp)"
          http_code="$(
            curl -sS \
              --retry 2 \
              --retry-delay 5 \
              --retry-all-errors \
              --max-time 20 \
              -H "Accept: application/json" \
              -H "x-keepalive-token: ${KEEPALIVE_TOKEN}" \
              -o "${body_file}" \
              -w "%{http_code}" \
              "${KEEPALIVE_URL}"
          )"

          echo "HTTP ${http_code}"
          cat "${body_file}"

          if [ "${http_code}" != "200" ]; then
            echo "::error::Keepalive endpoint returned HTTP ${http_code}"
            exit 1
          fi
